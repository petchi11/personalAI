<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Personal AI Assistant</title>
</head>
<body>
  <h2>Ask AI</h2>
  <input id="apiKey" type="text" placeholder="Enter your API key" style="width:300px;"><br><br>
  <input id="prompt" type="text" placeholder="Enter your prompt" style="width:300px;">
  <button onclick="askAI()">Send</button>
  <pre id="response"></pre>

  <script>
    async function askAI() {
      const userPrompt = document.getElementById("prompt").value;
      const apiKey = document.getElementById("apiKey").value;
      const responseBox = document.getElementById("response");

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "openai/gpt-oss-120b",
            messages: [{ role: "user", content: userPrompt }],
            max_tokens: 1000
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();
        responseBox.innerText = data.choices[0].message.content;

      } catch (error) {
        responseBox.innerText = "❌ Error: " + error.message;
      }
    }
  </script>
</body>
</html>
